<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYM LOG — PR & Hyrox Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0D0D0D;
    --charcoal: #1A1A1A;
    --steel: #2C2C2C;
    --iron: #3E3E3E;
    --chalk: #F0EDE8;
    --white: #FFFFFF;
    --yellow: #E8C840;
    --yellow-dim: rgba(232,200,64,0.15);
    --yellow-glow: rgba(232,200,64,0.3);
    --red: #E84040;
    --green: #40C880;
    --muted: #888;
  }

  body {
    background: var(--black);
    color: var(--chalk);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    padding: 2rem 2rem 1.5rem;
    border-bottom: 1px solid var(--steel);
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 2.4rem;
    letter-spacing: 0.05em;
    line-height: 1;
    color: var(--white);
  }
  .logo span { color: var(--yellow); }
  .tagline {
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    padding: 1.5rem 2rem 0;
    gap: 0.5rem;
    border-bottom: 1px solid var(--steel);
  }
  .tab-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.6rem 1.4rem;
    background: transparent;
    color: var(--muted);
    border: none;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn.active {
    color: var(--yellow);
    border-bottom-color: var(--yellow);
  }
  .tab-btn:hover:not(.active) { color: var(--chalk); }

  /* ── MAIN ── */
  main { padding: 2rem; max-width: 1100px; margin: 0 auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── SECTION HEADER ── */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .section-title small {
    display: block;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.6rem 1.2rem;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--yellow);
    color: var(--black);
  }
  .btn-primary:hover { background: #f0d040; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--chalk);
    border: 1px solid var(--iron);
  }
  .btn-ghost:hover { border-color: var(--muted); }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid transparent;
    font-size: 0.8rem;
    padding: 0.3rem 0.6rem;
  }
  .btn-danger:hover { border-color: var(--red); }
  .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.8rem; }

  /* ── CATEGORY FILTER ── */
  .filters {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .filter-chip {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.35rem 0.9rem;
    border-radius: 100px;
    border: 1px solid var(--iron);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-chip.active, .filter-chip:hover {
    border-color: var(--yellow);
    color: var(--yellow);
    background: var(--yellow-dim);
  }

  /* ── EXERCISE GRID ── */
  .exercise-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }

  /* ── EXERCISE CARD ── */
  .ex-card {
    background: var(--charcoal);
    border: 1px solid var(--steel);
    border-radius: 8px;
    padding: 1.2rem;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .ex-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--yellow);
    border-radius: 4px 0 0 4px;
  }
  .ex-card:hover { border-color: var(--iron); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
  }
  .ex-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    line-height: 1.2;
  }
  .ex-category {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
  }
  .card-actions { display: flex; gap: 0.3rem; }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    margin-bottom: 1rem;
  }
  .stat-box {
    background: var(--steel);
    border-radius: 6px;
    padding: 0.7rem 0.9rem;
  }
  .stat-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .stat-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.6rem;
    line-height: 1;
    color: var(--white);
  }
  .stat-value.highlight { color: var(--yellow); }
  .stat-unit {
    font-size: 0.75rem;
    color: var(--muted);
    margin-left: 2px;
  }

  .progress-bar-wrap {
    background: var(--steel);
    border-radius: 100px;
    height: 4px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--yellow), #f0d040);
    border-radius: 100px;
    transition: width 0.5s ease;
  }
  .card-date {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
  }

  /* history list */
  .history-toggle {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-top: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: color 0.15s;
  }
  .history-toggle:hover { color: var(--chalk); }
  .history-list {
    display: none;
    margin-top: 0.8rem;
    border-top: 1px solid var(--steel);
    padding-top: 0.8rem;
  }
  .history-list.open { display: block; }
  .history-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.3rem 0;
    font-size: 0.82rem;
    border-bottom: 1px solid var(--iron);
  }
  .history-entry:last-child { border-bottom: none; }
  .history-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }
  .history-date { color: var(--muted); font-size: 0.72rem; }

  /* ── HYROX SECTION ── */
  .hyrox-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }

  .hyrox-card {
    background: var(--charcoal);
    border: 1px solid var(--steel);
    border-radius: 8px;
    padding: 1.2rem;
    position: relative;
    overflow: hidden;
  }
  .hyrox-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--red);
    border-radius: 4px 0 0 4px;
  }
  .hyrox-card.pb::before { background: var(--green); }

  .hx-station {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .hx-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.2rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.2rem;
  }
  .hx-meta {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .time-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 2.4rem;
    line-height: 1;
    color: var(--white);
    letter-spacing: 0.02em;
    margin-bottom: 0.3rem;
  }
  .time-display .best-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--green);
    display: block;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .pb-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    background: rgba(64,200,128,0.15);
    border: 1px solid var(--green);
    color: var(--green);
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    border-radius: 100px;
    margin-left: 0.5rem;
    vertical-align: middle;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 1rem;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--charcoal);
    border: 1px solid var(--iron);
    border-radius: 12px;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.4rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    color: var(--white);
  }
  .modal-title span { color: var(--yellow); }

  .form-group { margin-bottom: 1rem; }
  .form-label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }
  .form-input, .form-select {
    width: 100%;
    padding: 0.7rem 0.9rem;
    background: var(--steel);
    border: 1px solid var(--iron);
    border-radius: 6px;
    color: var(--chalk);
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--yellow); }
  .form-select option { background: var(--charcoal); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

  .modal-actions {
    display: flex;
    gap: 0.8rem;
    margin-top: 1.5rem;
    justify-content: flex-end;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state p { font-size: 0.9rem; line-height: 1.6; }

  /* ── SUMMARY STATS ── */
  .summary-bar {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .summary-item {
    display: flex;
    flex-direction: column;
  }
  .summary-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 2rem;
    color: var(--yellow);
    line-height: 1;
  }
  .summary-lbl {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }
  .summary-divider {
    width: 1px;
    background: var(--steel);
    align-self: stretch;
  }

  /* ── REC TYPE SELECTOR ── */
  .rec-type-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
  }
  .rec-type-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.7rem 0.4rem;
    background: var(--steel);
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--chalk);
    font-family: 'Barlow', sans-serif;
  }
  .rec-type-btn:hover { border-color: var(--iron); }
  .rec-type-btn.active {
    border-color: var(--yellow);
    background: var(--yellow-dim);
  }
  .rec-type-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.3rem;
    color: var(--white);
    line-height: 1;
  }
  .rec-type-btn.active .rec-type-label { color: var(--yellow); }
  .rec-type-sub {
    font-size: 0.6rem;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-top: 4px;
    text-align: center;
    line-height: 1.3;
  }

  /* ── RM STATS en tarjeta ── */
  .rm-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 0.8rem;
  }
  .rm-box {
    background: var(--steel);
    border-radius: 6px;
    padding: 0.6rem 0.8rem;
    border: 1px solid transparent;
  }
  .rm-box.is-pr {
    border-color: var(--yellow);
    background: rgba(232,200,64,0.08);
  }
  .rm-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .rm-box.is-pr .rm-tag { color: var(--yellow); }
  .rm-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.45rem;
    line-height: 1;
    color: var(--white);
  }
  .rm-box.is-pr .rm-val { color: var(--yellow); }
  .rm-unit { font-size: 0.72rem; color: var(--muted); margin-left: 2px; }
  .rm-date { font-size: 0.62rem; color: var(--muted); margin-top: 2px; }

  @media (max-width: 600px) {
    main { padding: 1rem; }
    .form-row { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .time-display { font-size: 2rem; }
    .rec-type-grid { grid-template-columns: repeat(2, 1fr); }
    .rm-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">GYM<span>LOG</span></div>
  <div class="tagline">PR · RM · Hyrox Tracker</div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('gym')">🏋️ Gym — PRs & RMs</button>
  <button class="tab-btn" onclick="switchTab('hyrox')">🔥 Hyrox</button>
</div>

<main>

  <!-- ══ GYM TAB ══ -->
  <div id="tab-gym" class="tab-panel active">
    <div class="section-head">
      <div class="section-title">
        Ejercicios
        <small>Peso máximo (PR) y repeticiones máximas (RM)</small>
      </div>
      <button class="btn btn-primary" onclick="openExerciseModal()">+ Nuevo ejercicio</button>
    </div>

    <div id="gym-summary" class="summary-bar"></div>

    <div class="filters" id="gym-filters">
      <button class="filter-chip active" data-cat="all" onclick="filterGym(this, 'all')">Todos</button>
    </div>

    <div class="exercise-grid" id="exercise-grid">
      <div class="empty-state">
        <div class="icon">🏋️</div>
        <p>Sin ejercicios aún.<br>Añade tu primer ejercicio para empezar a trackear tus PRs.</p>
      </div>
    </div>
  </div>

  <!-- ══ HYROX TAB ══ -->
  <div id="tab-hyrox" class="tab-panel">
    <div class="section-head">
      <div class="section-title">
        Hyrox
        <small>Tests por estación y tiempos</small>
      </div>
      <button class="btn btn-primary" onclick="openHyroxModal()">+ Nuevo test</button>
    </div>

    <div id="hyrox-summary" class="summary-bar"></div>

    <div class="hyrox-grid" id="hyrox-grid">
      <div class="empty-state">
        <div class="icon">🔥</div>
        <p>Sin tests aún.<br>Registra tu primer test Hyrox.</p>
      </div>
    </div>
  </div>

</main>

<!-- ══ MODAL: EJERCICIO ══ -->
<div class="modal-overlay hidden" id="exercise-modal">
  <div class="modal">
    <div class="modal-title" id="ex-modal-title">Nuevo <span>ejercicio</span></div>
    <div class="form-group">
      <label class="form-label">Nombre del ejercicio</label>
      <input class="form-input" id="ex-name" placeholder="Ej: Sentadilla, Press banca…">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Categoría</label>
        <select class="form-select" id="ex-category">
          <option value="Piernas">Piernas</option>
          <option value="Empuje">Empuje</option>
          <option value="Jalón">Jalón</option>
          <option value="Hombros">Hombros</option>
          <option value="Core">Core</option>
          <option value="Full body">Full body</option>
          <option value="Cardio">Cardio</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Unidad de peso</label>
        <select class="form-select" id="ex-unit">
          <option value="kg">kg</option>
          <option value="lb">lb</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeExerciseModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveExercise()">Guardar ejercicio</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: REGISTRO (PR/RM) ══ -->
<div class="modal-overlay hidden" id="record-modal">
  <div class="modal">
    <div class="modal-title">Nuevo <span>registro</span></div>
    <div id="record-ex-name" style="font-family:'Barlow Condensed',sans-serif;font-size:1rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1.2rem;"></div>
    <!-- Tipo selector: botones visuales -->
    <div class="form-group">
      <label class="form-label">Tipo de registro</label>
      <div class="rec-type-grid" id="rec-type-grid">
        <button class="rec-type-btn active" data-type="PR" onclick="selectRecType(this,'PR')">
          <span class="rec-type-label">PR</span>
          <span class="rec-type-sub">Peso máximo · 1 rep</span>
        </button>
        <button class="rec-type-btn" data-type="1RM" onclick="selectRecType(this,'1RM')">
          <span class="rec-type-label">1RM</span>
          <span class="rec-type-sub">1 repetición</span>
        </button>
        <button class="rec-type-btn" data-type="3RM" onclick="selectRecType(this,'3RM')">
          <span class="rec-type-label">3RM</span>
          <span class="rec-type-sub">3 repeticiones</span>
        </button>
        <button class="rec-type-btn" data-type="5RM" onclick="selectRecType(this,'5RM')">
          <span class="rec-type-label">5RM</span>
          <span class="rec-type-sub">5 repeticiones</span>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" id="rec-val-label">Peso (kg)</label>
      <input class="form-input" id="rec-value" type="number" placeholder="0" min="0" step="0.5">
    </div>
    <div class="form-group">
      <label class="form-label">Fecha</label>
      <input class="form-input" id="rec-date" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">Nota (opcional)</label>
      <input class="form-input" id="rec-note" placeholder="Ej: sin faja, pausa en fondo…">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeRecordModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveRecord()">Guardar registro</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: HYROX ══ -->
<div class="modal-overlay hidden" id="hyrox-modal">
  <div class="modal">
    <div class="modal-title">Test <span>Hyrox</span></div>
    <div class="form-group">
      <label class="form-label">Estación</label>
      <select class="form-select" id="hx-station" onchange="onStationChange()">
        <option value="SkiErg">SkiErg</option>
        <option value="RowErg">RowErg</option>
        <option value="Sled Push">Sled Push</option>
        <option value="Sled Pull">Sled Pull</option>
        <option value="Farmer's Carry">Farmer's Carry</option>
        <option value="Sandbag Lunges">Sandbag Lunges</option>
        <option value="Wall Balls">Wall Balls</option>
        <option value="Burpee Broad Jump">Burpee Broad Jump</option>
        <option value="Running">Running</option>
        <option value="Otro">Otro</option>
      </select>
    </div>
    <!-- Distancia (SkiErg, RowErg, Running) -->
    <div class="form-group" id="hx-dist-group">
      <label class="form-label" id="hx-dist-label">Distancia (m)</label>
      <select class="form-select" id="hx-dist-preset" onchange="onDistPresetChange()">
        <!-- populated by JS -->
      </select>
      <input class="form-input" id="hx-dist-custom" type="number" placeholder="metros" min="1" style="margin-top:.5rem;display:none">
    </div>
    <!-- Peso (Sled, Farmer's, Sandbag, Wall Balls) -->
    <div class="form-group" id="hx-weight-group" style="display:none">
      <label class="form-label" id="hx-weight-label">Peso (kg)</label>
      <select class="form-select" id="hx-weight-preset" onchange="onWeightPresetChange()">
        <!-- populated by JS -->
      </select>
      <input class="form-input" id="hx-weight-custom" type="number" placeholder="kg" min="0" step="0.5" style="margin-top:.5rem;display:none">
    </div>
    <!-- Nombre personalizado -->
    <div class="form-group" id="hx-custom-group" style="display:none">
      <label class="form-label">Nombre personalizado</label>
      <input class="form-input" id="hx-custom" placeholder="Nombre del ejercicio">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Minutos</label>
        <input class="form-input" id="hx-min" type="number" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Segundos</label>
        <input class="form-input" id="hx-sec" type="number" placeholder="0" min="0" max="59">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Fecha</label>
      <input class="form-input" id="hx-date" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">Nota (opcional)</label>
      <input class="form-input" id="hx-note" placeholder="Condiciones, sensaciones…">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeHyroxModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveHyroxEntry()">Guardar test</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════
//  STATE — localStorage
// ══════════════════════════════
function load(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
}
function save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

let exercises = load('gymlog_exercises'); // [{id, name, category, unit, records:[{id,type,value,date,note}]}]
let hyroxData = load('gymlog_hyrox');     // [{id, station, meta, totalSec, date, note}]

// ══════════════════════════════
//  TABS
// ══════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`#tab-${tab}`).classList.add('active');
  event.currentTarget.classList.add('active');
  if (tab === 'gym') renderGym();
  else renderHyrox();
}

// ══════════════════════════════
//  GYM RENDER
// ══════════════════════════════
let activeFilter = 'all';

function renderGym() {
  renderFilters();
  renderGrid();
  renderGymSummary();
}

function renderFilters() {
  const cats = ['all', ...new Set(exercises.map(e => e.category))];
  const wrap = document.getElementById('gym-filters');
  wrap.innerHTML = cats.map(c =>
    `<button class="filter-chip ${c === activeFilter ? 'active' : ''}" onclick="filterGym(this,'${c}')">${c === 'all' ? 'Todos' : c}</button>`
  ).join('');
}

function filterGym(btn, cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('exercise-grid');
  const list = activeFilter === 'all' ? exercises : exercises.filter(e => e.category === activeFilter);

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🏋️</div><p>Sin ejercicios en esta categoría.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(ex => exerciseCardHTML(ex)).join('');
}

function renderGymSummary() {
  const totalPR = exercises.reduce((n, e) => n + e.records.filter(r => r.type === 'PR').length, 0);
  const totalRM = exercises.reduce((n, e) => n + e.records.filter(r => r.type !== 'PR').length, 0);
  document.getElementById('gym-summary').innerHTML = `
    <div class="summary-item"><div class="summary-val">${exercises.length}</div><div class="summary-lbl">Ejercicios</div></div>
    <div class="summary-divider"></div>
    <div class="summary-item"><div class="summary-val">${totalPR}</div><div class="summary-lbl">PRs registrados</div></div>
    <div class="summary-divider"></div>
    <div class="summary-item"><div class="summary-val">${totalRM}</div><div class="summary-lbl">RMs registrados</div></div>
  `;
}

// Best record per type (PR, 1RM, 3RM, 5RM) — highest weight
function bestOfType(ex, type) {
  const recs = ex.records.filter(r => r.type === type);
  if (!recs.length) return null;
  return recs.reduce((b, r) => r.value > b.value ? r : b);
}

function exerciseCardHTML(ex) {
  const pr   = bestOfType(ex, 'PR');
  const rm1  = bestOfType(ex, '1RM');
  const rm3  = bestOfType(ex, '3RM');
  const rm5  = bestOfType(ex, '5RM');
  const lastDate = ex.records.length ? [...ex.records].sort((a,b) => b.date.localeCompare(a.date))[0].date : null;

  // Build RM boxes: always show PR + the 3 RMs
  const boxes = [
    { label: 'PR', sub: '1 rep máx.', rec: pr, isPR: true },
    { label: '1RM', sub: '1 rep', rec: rm1, isPR: false },
    { label: '3RM', sub: '3 reps', rec: rm3, isPR: false },
    { label: '5RM', sub: '5 reps', rec: rm5, isPR: false },
  ];

  const rmHTML = `<div class="rm-grid">${boxes.map(b => `
    <div class="rm-box ${b.isPR ? 'is-pr' : ''}">
      <div class="rm-tag">${b.isPR ? '👑 ' : ''}${b.label} <span style="font-weight:400;font-size:.6rem;color:var(--muted)">${b.sub}</span></div>
      ${b.rec
        ? `<div class="rm-val">${b.rec.value}<span class="rm-unit">${ex.unit}</span></div>
           <div class="rm-date">${formatDate(b.rec.date)}</div>`
        : `<div class="rm-val" style="color:var(--iron)">—</div>`
      }
    </div>
  `).join('')}</div>`;

  const histHTML = ex.records.length ? `
    <button class="history-toggle" onclick="toggleHistory('hist-${ex.id}', this)">
      <span>▸</span> Historial (${ex.records.length})
    </button>
    <div class="history-list" id="hist-${ex.id}">
      ${[...ex.records].sort((a,b) => b.date.localeCompare(a.date)).map(r => `
        <div class="history-entry">
          <span>
            <span style="color:var(--yellow);font-size:.65rem;font-weight:700;margin-right:.4rem">${r.type}</span>
            <span class="history-val">${r.value} ${ex.unit}</span>
            ${r.note ? `<span style="color:var(--muted);font-size:.7rem"> · ${r.note}</span>` : ''}
          </span>
          <span>
            <span class="history-date">${formatDate(r.date)}</span>
            <button class="btn-danger" onclick="deleteRecord('${ex.id}','${r.id}')">✕</button>
          </span>
        </div>
      `).join('')}
    </div>
  ` : '';

  return `
    <div class="ex-card" id="card-${ex.id}">
      <div class="card-top">
        <div>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-category">${ex.category}</div>
        </div>
        <div class="card-actions">
          <button class="btn btn-primary btn-sm" onclick="openRecordModal('${ex.id}')">+ Registro</button>
          <button class="btn btn-danger" onclick="deleteExercise('${ex.id}')">✕</button>
        </div>
      </div>
      ${rmHTML}
      ${lastDate ? `<div class="card-date">Último registro: ${formatDate(lastDate)}</div>` : ''}
      ${histHTML}
    </div>
  `;
}

function toggleHistory(id, btn) {
  const list = document.getElementById(id);
  list.classList.toggle('open');
  btn.querySelector('span').textContent = list.classList.contains('open') ? '▾' : '▸';
}

// ══════════════════════════════
//  EXERCISE MODAL
// ══════════════════════════════
function openExerciseModal() {
  document.getElementById('ex-name').value = '';
  document.getElementById('exercise-modal').classList.remove('hidden');
  document.getElementById('ex-name').focus();
}
function closeExerciseModal() {
  document.getElementById('exercise-modal').classList.add('hidden');
}
function saveExercise() {
  const name = document.getElementById('ex-name').value.trim();
  if (!name) { alert('Escribe el nombre del ejercicio'); return; }
  const ex = {
    id: Date.now().toString(),
    name,
    category: document.getElementById('ex-category').value,
    unit: document.getElementById('ex-unit').value,
    records: []
  };
  exercises.push(ex);
  save('gymlog_exercises', exercises);
  closeExerciseModal();
  renderGym();
}
function deleteExercise(id) {
  if (!confirm('¿Eliminar este ejercicio y todos sus registros?')) return;
  exercises = exercises.filter(e => e.id !== id);
  save('gymlog_exercises', exercises);
  renderGym();
}

// ══════════════════════════════
//  RECORD MODAL
// ══════════════════════════════
let currentExId = null;
let currentRecType = 'PR';

function selectRecType(btn, type) {
  currentRecType = type;
  document.querySelectorAll('.rec-type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function openRecordModal(exId) {
  currentExId = exId;
  currentRecType = 'PR';
  const ex = exercises.find(e => e.id === exId);
  document.getElementById('record-ex-name').textContent = ex.name + ' · ' + ex.category;
  document.getElementById('rec-value').value = '';
  document.getElementById('rec-note').value = '';
  document.getElementById('rec-date').value = today();
  document.getElementById('rec-val-label').textContent = `Peso (${ex.unit})`;
  // reset type buttons
  document.querySelectorAll('.rec-type-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.type === 'PR');
  });
  document.getElementById('record-modal').classList.remove('hidden');
  document.getElementById('rec-value').focus();
}
function closeRecordModal() { document.getElementById('record-modal').classList.add('hidden'); }

function saveRecord() {
  const val = parseFloat(document.getElementById('rec-value').value);
  if (!val) { alert('Introduce el peso'); return; }
  const rec = {
    id: Date.now().toString(),
    type: currentRecType,
    value: val,
    date: document.getElementById('rec-date').value || today(),
    note: document.getElementById('rec-note').value.trim()
  };
  const ex = exercises.find(e => e.id === currentExId);
  ex.records.push(rec);
  save('gymlog_exercises', exercises);
  closeRecordModal();
  renderGym();
}
function deleteRecord(exId, recId) {
  const ex = exercises.find(e => e.id === exId);
  ex.records = ex.records.filter(r => r.id !== recId);
  save('gymlog_exercises', exercises);
  renderGym();
}

// ══════════════════════════════
//  HYROX — STATION CONFIG
// ══════════════════════════════
// type: 'distance' | 'weight' | 'none'
const STATION_CONFIG = {
  'SkiErg':           { type: 'distance', presets: [500, 1000, 2000], unit: 'm' },
  'RowErg':           { type: 'distance', presets: [500, 1000, 2000], unit: 'm' },
  'Running':          { type: 'distance', presets: [400, 1000, 5000], unit: 'm' },
  'Sled Push':        { type: 'weight',   presets: [60, 80, 102, 125, 152], unit: 'kg' },
  'Sled Pull':        { type: 'weight',   presets: [60, 80, 102, 125, 152], unit: 'kg' },
  "Farmer's Carry":   { type: 'weight',   presets: [16, 20, 24, 32], unit: 'kg/mano' },
  'Sandbag Lunges':   { type: 'weight',   presets: [10, 15, 20, 24, 30], unit: 'kg' },
  'Wall Balls':       { type: 'weight',   presets: [4, 6, 9, 10], unit: 'kg' },
  'Burpee Broad Jump':{ type: 'none' },
  'Otro':             { type: 'none' },
};

function getStationCfg(station) {
  return STATION_CONFIG[station] || { type: 'none' };
}

// key used for grouping cards: "station|param"
function entryGroupKey(h) {
  const cfg = getStationCfg(h.station);
  if (cfg.type === 'distance') return `${h.station}|${h.param}m`;
  if (cfg.type === 'weight')   return `${h.station}|${h.param}${cfg.unit}`;
  return h.station;
}

function entryParamLabel(h) {
  const cfg = getStationCfg(h.station);
  if (cfg.type === 'distance') return `${h.param} m`;
  if (cfg.type === 'weight')   return `${h.param} ${cfg.unit}`;
  return '';
}

// ══════════════════════════════
//  HYROX RENDER
// ══════════════════════════════
function renderHyrox() {
  const grid = document.getElementById('hyrox-grid');
  if (!hyroxData.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🔥</div><p>Sin tests Hyrox aún.<br>Registra tu primer test.</p></div>`;
    renderHyroxSummary();
    return;
  }

  // Group by station+param
  const groups = {};
  hyroxData.forEach(h => {
    const key = entryGroupKey(h);
    if (!groups[key]) groups[key] = { station: h.station, param: h.param, entries: [] };
    groups[key].entries.push(h);
  });

  // Order: by station name then param ascending
  const ordered = Object.values(groups).sort((a, b) => {
    if (a.station !== b.station) return a.station.localeCompare(b.station);
    return (parseFloat(a.param) || 0) - (parseFloat(b.param) || 0);
  });

  grid.innerHTML = ordered.map(({ station, param, entries }) => {
    const cfg = getStationCfg(station);
    const sorted = [...entries].sort((a, b) => a.totalSec - b.totalSec);
    const best = sorted[0];
    const hasPB = entries.length > 1;
    const cardId = `hx-hist-${(station + param).replace(/[\s\/]/g, '_')}`;
    const paramLabel = entryParamLabel(best);

    // improvement: first entry vs best
    const firstEntry = [...entries].sort((a, b) => a.date.localeCompare(b.date))[0];
    const improvement = firstEntry.totalSec - best.totalSec;

    return `
      <div class="hyrox-card ${hasPB ? 'pb' : ''}">
        <div class="hx-station">Hyrox · ${station}</div>
        <div class="hx-name">${station}${hasPB ? '<span class="pb-badge">✓ PB</span>' : ''}</div>
        ${paramLabel ? `<div class="hx-meta">${cfg.type === 'distance' ? '📏' : '🏋️'} ${paramLabel}</div>` : ''}
        <div class="time-display">
          <span class="best-label">Mejor marca</span>
          ${formatTime(best.totalSec)}
        </div>
        ${hasPB && improvement > 0 ? `
          <div class="card-date" style="margin-top:.5rem;color:var(--green)">
            ↓ Mejora: ${formatTime(improvement)} · ${entries.length} tests
          </div>` : `<div class="card-date" style="margin-top:.5rem">${entries.length} test${entries.length>1?'s':''}</div>`}
        <button class="history-toggle" onclick="toggleHistory('${cardId}', this)">
          <span>▸</span> Historial (${entries.length})
        </button>
        <div class="history-list" id="${cardId}">
          ${sorted.map(h => `
            <div class="history-entry">
              <span class="history-val">${formatTime(h.totalSec)}</span>
              <span>
                <span class="history-date">${formatDate(h.date)}${h.note ? ' · ' + h.note : ''}</span>
                <button class="btn-danger" onclick="deleteHyrox('${h.id}')">✕</button>
              </span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');

  renderHyroxSummary();
}

function renderHyroxSummary() {
  const total = hyroxData.length;
  const stations = new Set(hyroxData.map(h => h.station)).size;
  const groups = new Set(hyroxData.map(h => entryGroupKey(h))).size;
  document.getElementById('hyrox-summary').innerHTML = `
    <div class="summary-item"><div class="summary-val">${total}</div><div class="summary-lbl">Tests totales</div></div>
    <div class="summary-divider"></div>
    <div class="summary-item"><div class="summary-val">${stations}</div><div class="summary-lbl">Estaciones</div></div>
    <div class="summary-divider"></div>
    <div class="summary-item"><div class="summary-val">${groups}</div><div class="summary-lbl">Combis distintas</div></div>
  `;
}

// ══════════════════════════════
//  HYROX MODAL
// ══════════════════════════════
function openHyroxModal() {
  document.getElementById('hx-min').value = '';
  document.getElementById('hx-sec').value = '';
  document.getElementById('hx-note').value = '';
  document.getElementById('hx-date').value = today();
  document.getElementById('hyrox-modal').classList.remove('hidden');
  onStationChange();
}
function closeHyroxModal() { document.getElementById('hyrox-modal').classList.add('hidden'); }

function onStationChange() {
  const station = document.getElementById('hx-station').value;
  const cfg = getStationCfg(station);

  // dist group
  const distGroup = document.getElementById('hx-dist-group');
  const weightGroup = document.getElementById('hx-weight-group');
  const customGroup = document.getElementById('hx-custom-group');

  distGroup.style.display = 'none';
  weightGroup.style.display = 'none';
  customGroup.style.display = 'none';

  if (cfg.type === 'distance') {
    distGroup.style.display = 'block';
    document.getElementById('hx-dist-label').textContent = `Distancia (${cfg.unit})`;
    const presets = cfg.presets.map(p => `<option value="${p}">${p} ${cfg.unit}</option>`).join('');
    document.getElementById('hx-dist-preset').innerHTML = presets + '<option value="otro">Otra distancia…</option>';
    document.getElementById('hx-dist-custom').style.display = 'none';
    document.getElementById('hx-dist-custom').value = '';
  } else if (cfg.type === 'weight') {
    weightGroup.style.display = 'block';
    document.getElementById('hx-weight-label').textContent = `Peso (${cfg.unit})`;
    const presets = cfg.presets.map(p => `<option value="${p}">${p} ${cfg.unit}</option>`).join('');
    document.getElementById('hx-weight-preset').innerHTML = presets + '<option value="otro">Otro peso…</option>';
    document.getElementById('hx-weight-custom').style.display = 'none';
    document.getElementById('hx-weight-custom').value = '';
  } else if (station === 'Otro') {
    customGroup.style.display = 'block';
  }
}

function onDistPresetChange() {
  const val = document.getElementById('hx-dist-preset').value;
  document.getElementById('hx-dist-custom').style.display = val === 'otro' ? 'block' : 'none';
}
function onWeightPresetChange() {
  const val = document.getElementById('hx-weight-preset').value;
  document.getElementById('hx-weight-custom').style.display = val === 'otro' ? 'block' : 'none';
}

function saveHyroxEntry() {
  let station = document.getElementById('hx-station').value;
  if (station === 'Otro') {
    station = document.getElementById('hx-custom').value.trim() || 'Otro';
  }
  const cfg = getStationCfg(document.getElementById('hx-station').value);

  let param = null;
  if (cfg.type === 'distance') {
    const preset = document.getElementById('hx-dist-preset').value;
    param = preset === 'otro'
      ? parseFloat(document.getElementById('hx-dist-custom').value)
      : parseFloat(preset);
    if (!param) { alert('Introduce la distancia'); return; }
  } else if (cfg.type === 'weight') {
    const preset = document.getElementById('hx-weight-preset').value;
    param = preset === 'otro'
      ? parseFloat(document.getElementById('hx-weight-custom').value)
      : parseFloat(preset);
    if (!param && param !== 0) { alert('Introduce el peso'); return; }
  }

  const min = parseInt(document.getElementById('hx-min').value) || 0;
  const sec = parseInt(document.getElementById('hx-sec').value) || 0;
  if (!min && !sec) { alert('Introduce el tiempo'); return; }

  const entry = {
    id: Date.now().toString(),
    station,
    param,   // number or null
    totalSec: min * 60 + sec,
    date: document.getElementById('hx-date').value || today(),
    note: document.getElementById('hx-note').value.trim()
  };
  hyroxData.push(entry);
  save('gymlog_hyrox', hyroxData);
  closeHyroxModal();
  renderHyrox();
}

function deleteHyrox(id) {
  if (!confirm('¿Eliminar este test?')) return;
  hyroxData = hyroxData.filter(h => h.id !== id);
  save('gymlog_hyrox', hyroxData);
  renderHyrox();
}

// ══════════════════════════════
//  UTILS
// ══════════════════════════════
function today() {
  return new Date().toISOString().slice(0,10);
}
function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function formatTime(totalSec) {
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}


// close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.add('hidden'); });
});

// ══════════════════════════════
//  INIT
// ══════════════════════════════
renderGym();
</script>
</body>
</html>
